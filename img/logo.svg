<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 258 48">
  <defs>
    <linearGradient id="stripe-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D42B2B"/>
      <stop offset="100%" stop-color="#A81818"/>
    </linearGradient>
  </defs>

  <!-- Left stripe -->
  <polygon points="2,44 12,44 26,4 16,4" fill="url(#stripe-grad)"/>
  <!-- Right stripe -->
  <polygon points="16,44 26,44 40,4 30,4" fill="url(#stripe-grad)"/>

  <!-- Tagline: тепло близко -->
  <text
    x="50" y="17"
    font-family="Arial, Helvetica, sans-serif"
    font-size="9.5"
    font-style="italic"
    font-weight="400"
    fill="#AAAAAA"
    letter-spacing="0.4">тепло близко</text>

  <!-- Main title -->
  <text
    x="50" y="41"
    font-family="Arial, 'Arial Black', Helvetica, sans-serif"
    font-size="23"
    font-weight="800"
    letter-spacing="-0.4">
    <tspan fill="#1A1A2E">ПроксиТерм</tspan><tspan fill="#888888" font-weight="600" font-size="20">.Склад</tspan>
  </text>
