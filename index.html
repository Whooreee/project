<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Склад</title>
  <link rel="stylesheet" href="https://unpkg.com/antd@5/dist/reset.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/dayjs/dayjs.min.js"></script>
  <script src="https://unpkg.com/antd@5/dist/antd.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background: #fff; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {
  ConfigProvider, App, Tabs, Form, Input, InputNumber, Select, Button,
  Table, Card, Statistic, List, Space, Typography, Tag, Popconfirm,
  Row, Col, Empty, Divider
} = antd;

const { useState, useEffect, useCallback } = React;

// ── Config ──────────────────────────────────────────────────────────────
const PASSWORD  = '1488';
const CLOUD_DB  = 'https://proxytherm-e2db4-default-rtdb.firebaseio.com';
const STORE_KEY = 'sklad-v1';
// ────────────────────────────────────────────────────────────────────────

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function matLabel(m) {
  if (!m) return 'удалён';
  return m.type === 'pipe'
    ? `Труба Ø${m.diameter}×${m.wall}`
    : `Профиль ${m.height}×${m.width}×${m.wall}`;
}

function loadLocal() {
  try {
    const s = localStorage.getItem(STORE_KEY);
    return s ? JSON.parse(s) : { materials: [], products: [], writeoffs: [] };
  } catch { return { materials: [], products: [], writeoffs: [] }; }
}

function saveLocal(s) { localStorage.setItem(STORE_KEY, JSON.stringify(s)); }

async function loadCloud() {
  try {
    const res = await fetch(`${CLOUD_DB}/${STORE_KEY}.json`);
    if (!res.ok) return { result: 'error' };
    const data = await res.json();
    if (data && typeof data === 'object') return { result: 'loaded', data };
    return { result: 'empty' };
  } catch { return { result: 'error' }; }
}

async function saveCloud(state) {
  try {
    const res = await fetch(`${CLOUD_DB}/${STORE_KEY}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });
    return res.ok;
  } catch { return false; }
}

// ── Auth ─────────────────────────────────────────────────────────────────
function AuthScreen({ onLogin }) {
  const [pwd, setPwd] = useState('');
  const [error, setError] = useState('');

  const login = () => {
    if (pwd === PASSWORD) {
      sessionStorage.setItem('sklad-auth', '1');
      onLogin();
    } else {
      setError('Неверный пароль');
      setPwd('');
      setTimeout(() => setError(''), 2000);
    }
  };

  return (
    <div style={{ position:'fixed', inset:0, display:'flex', alignItems:'center', justifyContent:'center', background:'#fff' }}>
      <Card style={{ width: 320, textAlign: 'center' }}>
        <Typography.Title level={3} style={{ marginBottom: 4 }}>Склад</Typography.Title>
        <Typography.Text type="secondary" style={{ display:'block', marginBottom: 24 }}>
          Введите пароль для входа
        </Typography.Text>
        <Input.Password
          size="large"
          value={pwd}
          onChange={e => setPwd(e.target.value)}
          onPressEnter={login}
          placeholder="Пароль"
          style={{ marginBottom: 12 }}
          autoFocus
        />
        <Button type="primary" size="large" block onClick={login}>Войти</Button>
        {error && (
          <Typography.Text type="danger" style={{ display:'block', marginTop: 8 }}>
            {error}
          </Typography.Text>
        )}
      </Card>
    </div>
  );
}

// ── Materials tab ─────────────────────────────────────────────────────────
function MaterialItem({ m, onAdjust, onDelete }) {
  const [amt, setAmt] = useState(1);
  return (
    <List.Item
      actions={[
        <Popconfirm key="del" title="Удалить материал?" onConfirm={() => onDelete(m.id)} okText="Да" cancelText="Нет">
          <Button danger size="small" type="text">Удалить</Button>
        </Popconfirm>
      ]}
    >
      <div style={{ display:'flex', alignItems:'center', gap:12, flex:1, flexWrap:'wrap' }}>
        <div style={{ flex:1, minWidth:120 }}>
          <Space>
            <Tag color={m.type === 'pipe' ? 'blue' : 'green'} style={{ margin:0 }}>
              {m.type === 'pipe' ? 'Труба' : 'Профиль'}
            </Tag>
            <Typography.Text strong>{matLabel(m)}</Typography.Text>
          </Space>
        </div>
        <Space wrap size={4}>
          <Button size="small" onClick={() => onAdjust(m.id, -1, amt)}>−</Button>
          <InputNumber size="small" value={amt} min={0.01} step={0.01}
            style={{ width:65 }} onChange={v => setAmt(v || 1)} />
          <Button size="small" onClick={() => onAdjust(m.id, 1, amt)}>+</Button>
          <Typography.Text strong style={{ minWidth:80, textAlign:'right', display:'inline-block' }}>
            {m.stock.toFixed(2)} м
          </Typography.Text>
        </Space>
      </div>
    </List.Item>
  );
}

function MaterialsTab({ state, onSave }) {
  const [form] = Form.useForm();
  const [matType, setMatType] = useState('pipe');
  const { message } = App.useApp();

  const addMaterial = values => {
    const mat = { id: genId(), type: values.type, wall: values.wall, stock: values.stock || 0 };
    if (values.type === 'pipe') mat.diameter = values.diameter;
    else { mat.height = values.height; mat.width = values.width; }
    onSave({ ...state, materials: [...state.materials, mat] });
    form.resetFields(['diameter','height','width','wall','stock']);
    message.success('Материал добавлен');
  };

  const adjustStock = (id, delta, amt) => {
    onSave({
      ...state,
      materials: state.materials.map(m =>
        m.id === id
          ? { ...m, stock: Math.max(0, Math.round((m.stock + delta * amt) * 1000) / 1000) }
          : m
      )
    });
  };

  const deleteMaterial = id => {
    onSave({ ...state, materials: state.materials.filter(m => m.id !== id) });
  };

  return (
    <Space direction="vertical" style={{ width:'100%' }} size="middle">
      <Card title="Добавить материал" size="small">
        <Form form={form} layout="vertical" onFinish={addMaterial} initialValues={{ type:'pipe', stock:0 }}>
          <Row gutter={[12,0]}>
            <Col xs={24} sm={6}>
              <Form.Item name="type" label="Тип">
                <Select onChange={v => { setMatType(v); form.resetFields(['diameter','height','width']); }}>
                  <Select.Option value="pipe">Труба</Select.Option>
                  <Select.Option value="profile">Профиль</Select.Option>
                </Select>
              </Form.Item>
            </Col>
            {matType === 'pipe' ? (
              <Col xs={24} sm={6}>
                <Form.Item name="diameter" label="Диаметр (мм)" rules={[{ required:true, message:'Укажите' }]}>
                  <InputNumber min={0} placeholder="57" style={{ width:'100%' }} />
                </Form.Item>
              </Col>
            ) : (<>
              <Col xs={12} sm={4}>
                <Form.Item name="height" label="Высота (мм)" rules={[{ required:true, message:'Укажите' }]}>
                  <InputNumber min={0} placeholder="60" style={{ width:'100%' }} />
                </Form.Item>
              </Col>
              <Col xs={12} sm={4}>
                <Form.Item name="width" label="Ширина (мм)" rules={[{ required:true, message:'Укажите' }]}>
                  <InputNumber min={0} placeholder="40" style={{ width:'100%' }} />
                </Form.Item>
              </Col>
            </>)}
            <Col xs={12} sm={4}>
              <Form.Item name="wall" label="Стенка (мм)" rules={[{ required:true, message:'Укажите' }]}>
                <InputNumber min={0} step={0.1} placeholder="3.5" style={{ width:'100%' }} />
              </Form.Item>
            </Col>
            <Col xs={12} sm={4}>
              <Form.Item name="stock" label="Остаток (м)">
                <InputNumber min={0} step={0.01} style={{ width:'100%' }} />
              </Form.Item>
            </Col>
          </Row>
          <Button type="primary" htmlType="submit">Добавить</Button>
        </Form>
      </Card>

      {state.materials.length === 0
        ? <Empty description="Нет материалов — добавьте первый" />
        : <Card size="small">
            <List
              dataSource={state.materials}
              renderItem={m => (
                <MaterialItem key={m.id} m={m} onAdjust={adjustStock} onDelete={deleteMaterial} />
              )}
            />
          </Card>
      }
    </Space>
  );
}

// ── Products tab ──────────────────────────────────────────────────────────
function ProductsTab({ state, onSave }) {
  const [form] = Form.useForm();
  const [prodMats, setProdMats] = useState([]);
  const { message } = App.useApp();

  const addMat = () => {
    const matId = form.getFieldValue('p_mat');
    const amount = form.getFieldValue('p_amt');
    if (!matId || !amount || amount <= 0) return;
    setProdMats(prev => {
      const i = prev.findIndex(x => x.matId === matId);
      if (i >= 0) { const u = [...prev]; u[i] = { matId, amount }; return u; }
      return [...prev, { matId, amount }];
    });
    form.setFieldValue('p_amt', null);
  };

  const createProduct = () => {
    const name = form.getFieldValue('p_name')?.trim();
    if (!name) { message.error('Укажите название'); return; }
    if (!prodMats.length) { message.error('Добавьте хотя бы один материал'); return; }
    onSave({ ...state, products: [...state.products, { id: genId(), name, materials: prodMats }] });
    setProdMats([]);
    form.setFieldsValue({ p_name: '', p_amt: null });
    message.success('Изделие создано');
  };

  const deleteProduct = id => {
    onSave({ ...state, products: state.products.filter(p => p.id !== id) });
  };

  return (
    <Space direction="vertical" style={{ width:'100%' }} size="middle">
      <Card title="Создать изделие" size="small">
        <Form form={form} layout="vertical">
          <Form.Item name="p_name" label="Название изделия">
            <Input placeholder="Например: Рама 2м" />
          </Form.Item>
          {state.materials.length > 0 && (
            <Row gutter={[12,0]} align="bottom">
              <Col xs={24} sm={12}>
                <Form.Item name="p_mat" label="Материал">
                  <Select placeholder="Выберите материал">
                    {state.materials.map(m => (
                      <Select.Option key={m.id} value={m.id}>{matLabel(m)}</Select.Option>
                    ))}
                  </Select>
                </Form.Item>
              </Col>
              <Col xs={16} sm={8}>
                <Form.Item name="p_amt" label="Расход (м)">
                  <InputNumber min={0} step={0.01} placeholder="1.5" style={{ width:'100%' }} />
                </Form.Item>
              </Col>
              <Col xs={8} sm={4}>
                <Form.Item label=" ">
                  <Button onClick={addMat} block>+ Добавить</Button>
                </Form.Item>
              </Col>
            </Row>
          )}
          {prodMats.map(x => {
            const m = state.materials.find(m => m.id === x.matId);
            return (
              <div key={x.matId} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'6px 10px', background:'#fafafa', border:'1px solid #f0f0f0', borderRadius:6, marginBottom:6 }}>
                <Typography.Text type="secondary">{matLabel(m)} — {x.amount} м</Typography.Text>
                <Button size="small" type="text" danger onClick={() => setProdMats(p => p.filter(i => i.matId !== x.matId))}>✕</Button>
              </div>
            );
          })}
          <Button type="primary" onClick={createProduct} style={{ marginTop:8 }}>Создать изделие</Button>
        </Form>
      </Card>

      {state.products.length === 0
        ? <Empty description="Нет изделий — создайте первое" />
        : state.products.map(p => (
            <Card key={p.id} size="small" style={{ marginBottom:8 }}
              title={<Typography.Text strong>{p.name}</Typography.Text>}
              extra={
                <Popconfirm title="Удалить изделие?" onConfirm={() => deleteProduct(p.id)} okText="Да" cancelText="Нет">
                  <Button danger size="small" type="text">Удалить</Button>
                </Popconfirm>
              }
            >
              {p.materials.map(x => {
                const m = state.materials.find(m => m.id === x.matId);
                return (
                  <div key={x.matId} style={{ display:'flex', justifyContent:'space-between', fontSize:13, color:'#666', padding:'2px 0' }}>
                    <span>{matLabel(m)}</span><span>{x.amount} м</span>
                  </div>
                );
              })}
            </Card>
          ))
      }
    </Space>
  );
}

// ── Writeoffs tab ─────────────────────────────────────────────────────────
function WriteoffsTab({ state, onSave }) {
  const [form] = Form.useForm();
  const [preview, setPreview] = useState(null);
  const { message } = App.useApp();

  const updatePreview = () => {
    const prodId = form.getFieldValue('wo_prod');
    const qty = form.getFieldValue('wo_qty') || 1;
    const p = state.products.find(p => p.id === prodId);
    if (!p) { setPreview(null); return; }
    setPreview({
      qty,
      items: p.materials.map(x => {
        const m = state.materials.find(m => m.id === x.matId);
        const total = x.amount * qty;
        return { label: matLabel(m), total, enough: m && m.stock >= total };
      })
    });
  };

  const doWriteoff = () => {
    const prodId = form.getFieldValue('wo_prod');
    const qty = form.getFieldValue('wo_qty');
    if (!prodId) { message.error('Выберите изделие'); return; }
    if (!qty || qty <= 0) { message.error('Укажите количество'); return; }
    const p = state.products.find(p => p.id === prodId);
    if (!p) return;

    for (const x of p.materials) {
      const m = state.materials.find(m => m.id === x.matId);
      if (!m || m.stock < x.amount * qty) {
        message.error(`Недостаточно: ${matLabel(m)}`);
        return;
      }
    }

    const newMats = state.materials.map(m => ({ ...m }));
    const items = p.materials.map(x => {
      const idx = newMats.findIndex(m => m.id === x.matId);
      const meters = Math.round(x.amount * qty * 1000) / 1000;
      newMats[idx].stock = Math.round((newMats[idx].stock - meters) * 1000) / 1000;
      return { materialId: x.matId, materialName: matLabel(newMats[idx]), meters };
    });

    onSave({
      ...state,
      materials: newMats,
      writeoffs: [...state.writeoffs, { id: genId(), productId: p.id, productName: p.name, quantity: qty, timestamp: Date.now(), items }]
    });
    form.setFieldValue('wo_qty', null);
    setPreview(null);
    message.success(`Списано: ${p.name} × ${qty} шт.`);
  };

  return (
    <Space direction="vertical" style={{ width:'100%' }} size="middle">
      <Card title="Списание" size="small">
        {state.products.length === 0
          ? <Empty description="Сначала создайте изделие" />
          : <Form form={form} layout="vertical">
              <Row gutter={[12,0]}>
                <Col xs={24} sm={16}>
                  <Form.Item name="wo_prod" label="Изделие">
                    <Select placeholder="Выберите изделие" onChange={updatePreview}>
                      {state.products.map(p => (
                        <Select.Option key={p.id} value={p.id}>{p.name}</Select.Option>
                      ))}
                    </Select>
                  </Form.Item>
                </Col>
                <Col xs={24} sm={8}>
                  <Form.Item name="wo_qty" label="Количество (шт)">
                    <InputNumber min={1} step={1} style={{ width:'100%' }} onChange={updatePreview} />
                  </Form.Item>
                </Col>
              </Row>
              {preview && (
                <Card size="small" style={{ marginBottom:12, background:'#fafafa' }}
                  title={<Typography.Text type="secondary" style={{ fontSize:12 }}>Состав на {preview.qty} шт.</Typography.Text>}
                >
                  {preview.items.map((item, i) => (
                    <div key={i} style={{ display:'flex', justifyContent:'space-between', fontSize:13, padding:'3px 0' }}>
                      <span>{item.label}</span>
                      <span style={{ color: item.enough ? '#666' : '#cc3333' }}>
                        {item.total.toFixed(2)} м{!item.enough ? ' — недостаточно' : ''}
                      </span>
                    </div>
                  ))}
                </Card>
              )}
              <Button type="primary" onClick={doWriteoff}>Списать</Button>
            </Form>
        }
      </Card>
    </Space>
  );
}

// ── Summary tab ───────────────────────────────────────────────────────────
function SummaryTab({ state }) {
  const totalItems  = state.writeoffs.reduce((s, w) => s + w.quantity, 0);
  const totalMeters = state.writeoffs.reduce((s, w) => s + w.items.reduce((ss, i) => ss + i.meters, 0), 0);

  const breakdown = {};
  for (const w of state.writeoffs)
    for (const item of w.items)
      breakdown[item.materialName] = (breakdown[item.materialName] || 0) + item.meters;

  const bdData = Object.entries(breakdown).map(([name, meters], i) => ({ key: i, name, meters }));

  const histData = [...state.writeoffs].reverse().map(w => ({
    key: w.id,
    product: `${w.productName} — ${w.quantity} шт.`,
    date: new Date(w.timestamp).toLocaleString('ru', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }),
    detail: w.items.map(i => `${i.materialName}: ${i.meters.toFixed(2)} м`).join(' · ')
  }));

  return (
    <Space direction="vertical" style={{ width:'100%' }} size="middle">
      <Row gutter={[12,12]}>
        <Col xs={8}><Card size="small"><Statistic title="Списано изделий" value={totalItems} /></Card></Col>
        <Col xs={8}><Card size="small"><Statistic title="Материалов (м)" value={totalMeters.toFixed(2)} /></Card></Col>
        <Col xs={8}><Card size="small"><Statistic title="Операций" value={state.writeoffs.length} /></Card></Col>
      </Row>

      <Card title="По материалам" size="small">
        {bdData.length === 0
          ? <Empty description="Списаний пока нет" />
          : <Table dataSource={bdData} size="small" pagination={false}
              columns={[
                { title: 'Материал', dataIndex: 'name' },
                { title: 'Списано (м)', dataIndex: 'meters', align: 'right', render: v => v.toFixed(2) }
              ]}
            />
        }
      </Card>

      <Card title="История списаний" size="small">
        {histData.length === 0
          ? <Empty description="История пуста" />
          : <List dataSource={histData} renderItem={item => (
              <List.Item key={item.key}>
                <div style={{ width:'100%' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4, flexWrap:'wrap', gap:4 }}>
                    <Typography.Text strong>{item.product}</Typography.Text>
                    <Typography.Text type="secondary" style={{ fontSize:12 }}>{item.date}</Typography.Text>
                  </div>
                  <Typography.Text type="secondary" style={{ fontSize:13 }}>{item.detail}</Typography.Text>
                </div>
              </List.Item>
            )} />
        }
      </Card>
    </Space>
  );
}

// ── Main ──────────────────────────────────────────────────────────────────
function WarehouseApp() {
  const [state, setStateRaw] = useState(loadLocal);
  const [syncStatus, setSyncStatus] = useState('');

  const onSave = useCallback(newState => {
    setStateRaw(newState);
    saveLocal(newState);
    saveCloud(newState).then(ok => {
      setSyncStatus(ok
        ? 'Синхронизировано ' + new Date().toLocaleTimeString('ru', { hour:'2-digit', minute:'2-digit' })
        : 'Нет связи с облаком');
    });
  }, []);

  useEffect(() => {
    setSyncStatus('Синхронизация...');
    loadCloud().then(({ result, data }) => {
      if (result === 'loaded') {
        setStateRaw(data); saveLocal(data); setSyncStatus('Синхронизировано');
      } else if (result === 'empty') {
        saveCloud(loadLocal()).then(() => setSyncStatus('Синхронизировано'));
      } else {
        setSyncStatus('Облако недоступно');
      }
    });
    const timer = setInterval(() => {
      loadCloud().then(({ result, data }) => {
        if (result === 'loaded') { setStateRaw(data); saveLocal(data); setSyncStatus('Синхронизировано'); }
      });
    }, 60000);
    return () => clearInterval(timer);
  }, []);

  const tabs = [
    { key: 'materials', label: 'Материалы',  children: <MaterialsTab  state={state} onSave={onSave} /> },
    { key: 'products',  label: 'Изделия',     children: <ProductsTab   state={state} onSave={onSave} /> },
    { key: 'writeoffs', label: 'Списания',    children: <WriteoffsTab  state={state} onSave={onSave} /> },
    { key: 'summary',   label: 'Итог',        children: <SummaryTab    state={state} /> },
  ];

  return (
    <div style={{ maxWidth: 800, margin: '0 auto', padding: '0 16px 80px' }}>
      <div style={{ padding: '20px 0 8px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <Typography.Title level={4} style={{ margin:0 }}>Склад</Typography.Title>
        <Typography.Text type="secondary" style={{ fontSize:11 }}>{syncStatus}</Typography.Text>
      </div>
      <Tabs items={tabs} />
    </div>
  );
}

// ── Root ──────────────────────────────────────────────────────────────────
function Root() {
  const [authed, setAuthed] = useState(sessionStorage.getItem('sklad-auth') === '1');
  if (!authed) return <AuthScreen onLogin={() => setAuthed(true)} />;
  return (
    <ConfigProvider theme={{ token: { colorPrimary: '#c0392b' } }}>
      <App>
        <WarehouseApp />
      </App>
    </ConfigProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
