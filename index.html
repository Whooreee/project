<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Склад</title>
  <style>
    /* variables */
    :root {
      --bg: #ffffff;
      --bg-secondary: #f7f7f5;
      --border: #e6e6e6;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-muted: #9b9b9b;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
    }

    /* base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* layout */
    .app {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* header */
    .header {
      padding: 40px 0 0;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    /* tabs */
    .tabs {
      display: flex;
      gap: 2px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      padding: 8px 18px;
      font-size: 14px;
      font-family: var(--font);
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

    /* tab content */
    .tab-content { display: none; padding-top: 32px; }
    .tab-content.active { display: block; }

    /* section */
    .section { margin-bottom: 48px; }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* form */
    .form {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 10px;
    }

    .form-row:last-child { margin-bottom: 0; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 100px;
    }

    .field label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .field input, .field select {
      font-family: var(--font);
      font-size: 14px;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    .field input:focus, .field select:focus { border-color: #aaa; }

    /* buttons */
    .btn {
      font-family: var(--font);
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
      white-space: nowrap;
      line-height: 1.4;
    }

    .btn-primary { background: #c0392b; color: #fff; border-color: #c0392b; }
    .btn-primary:hover { background: #a93226; border-color: #a93226; }
    .btn-ghost { background: none; color: #c0392b; border-color: #c0392b; }
    .btn-ghost:hover { background: #fdf2f2; color: #a93226; }
    .btn-danger { background: none; color: #cc3333; border-color: transparent; padding: 4px 8px; font-size: 12px; }
    .btn-danger:hover { background: #fff0f0; }

    /* material list */
    .material-list, .product-list { display: flex; flex-direction: column; gap: 6px; }

    .material-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      gap: 12px;
    }

    .material-info { flex: 1; }

    .material-name { font-size: 14px; font-weight: 500; }

    .material-stock {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stock-value {
      font-size: 14px;
      font-weight: 600;
      min-width: 72px;
      text-align: right;
      color: var(--text);
    }

    .stock-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: all 0.1s;
      font-family: var(--font);
      flex-shrink: 0;
    }

    .stock-btn:hover { background: var(--bg-secondary); color: var(--text); }

    .stock-input {
      width: 58px;
      text-align: center;
      font-size: 13px;
      padding: 4px 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font);
      outline: none;
      flex-shrink: 0;
    }

    /* product item */
    .product-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      overflow: hidden;
    }

    .product-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
    }

    .product-name { font-size: 14px; font-weight: 500; }

    .product-composition {
      padding: 0 14px 10px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    .composition-item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-secondary);
      padding: 3px 0;
    }

    /* writeoff preview */
    .writeoff-preview {
      margin-top: 12px;
      padding: 12px;
      background: var(--bg);
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .writeoff-preview-title {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .writeoff-preview-item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-secondary);
      padding: 3px 0;
    }

    .not-enough { color: #cc3333 !important; }

    /* added material in product form */
    .added-material {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      margin-bottom: 32px;
    }

    .stat-card {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .stat-value { font-size: 26px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }

    /* breakdown */
    .breakdown-table { width: 100%; border-collapse: collapse; }

    .breakdown-table th, .breakdown-table td {
      text-align: left;
      padding: 10px 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }

    .breakdown-table th { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .breakdown-table td { color: var(--text-secondary); }
    .breakdown-table td:first-child { color: var(--text); }

    /* history */
    .history-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .history-item:last-child { border-bottom: none; }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .history-product { font-size: 14px; font-weight: 500; }
    .history-meta { font-size: 12px; color: var(--text-muted); }
    .history-detail { font-size: 13px; color: var(--text-secondary); }

    /* empty */
    .empty {
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    /* error */
    .error-msg { font-size: 13px; color: #cc3333; margin-top: 8px; min-height: 18px; }

    /* success */
    .success-msg { font-size: 13px; color: #2d7a2d; margin-top: 8px; min-height: 18px; }

    /* responsive */
    @media (max-width: 600px) {
      .app { padding: 0 12px 80px; }
      .header { padding: 24px 0 0; margin-bottom: 20px; }
      .header h1 { font-size: 20px; margin-bottom: 14px; }

      /* tabs full width */
      .tabs { gap: 0; }
      .tab-btn { flex: 1; padding: 10px 8px; font-size: 13px; text-align: center; }

      /* form */
      .form { padding: 12px; }
      .form-row { flex-direction: column; gap: 8px; align-items: stretch; }
      .field { min-width: unset; width: 100%; max-width: 100% !important; flex: 1 1 100%; }
      .field[style] { max-width: 100% !important; width: 100% !important; }

      /* bigger tap targets */
      .field input, .field select {
        padding: 10px 12px;
        font-size: 16px; /* prevent zoom on iOS */
        min-height: 44px;
      }
      .btn { min-height: 44px; padding: 10px 16px; font-size: 14px; width: 100%; }
      .btn-danger { width: auto; min-height: 36px; }

      /* material item — stack name + controls */
      .material-item {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        padding: 12px;
      }
      .material-stock {
        display: grid;
        grid-template-columns: 44px 1fr 44px auto auto;
        align-items: center;
        gap: 6px;
      }
      .stock-btn { width: 44px; height: 44px; font-size: 20px; }
      .stock-input { width: 100%; min-height: 44px; font-size: 16px; }
      .stock-value { min-width: unset; font-size: 13px; text-align: center; }

      /* product form */
      .field[style*="flex:0"] { align-self: stretch !important; }

      /* stats */
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .stat-value { font-size: 22px; }

      /* table — scrollable */
      .breakdown-table { font-size: 12px; }
      .breakdown-table th, .breakdown-table td { padding: 8px 8px; }
      #breakdown-table { overflow-x: auto; }

      /* history */
      .history-header { flex-direction: column; align-items: flex-start; gap: 2px; }
      .history-meta { font-size: 11px; }

      /* section spacing */
      .section { margin-bottom: 36px; }
      .tab-content { padding-top: 20px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Склад</h1>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('manage')">Управление</button>
      <button class="tab-btn" onclick="switchTab('summary')">Итог</button>
    </div>
  </div>

  <!-- TAB 1 -->
  <div id="tab-manage" class="tab-content active">

    <!-- Материалы -->
    <div class="section">
      <div class="section-title">Материалы</div>
      <div class="form">
        <div class="form-row">
          <div class="field" style="max-width:130px">
            <label>Тип</label>
            <select id="mat-type" onchange="updateMatFields()">
              <option value="pipe">Труба</option>
              <option value="profile">Профиль</option>
            </select>
          </div>
          <div class="field" id="mat-diameter-field">
            <label>Диаметр (мм)</label>
            <input type="number" id="mat-diameter" placeholder="57" min="0">
          </div>
          <div class="field" id="mat-height-field" style="display:none">
            <label>Высота (мм)</label>
            <input type="number" id="mat-height" placeholder="60" min="0">
          </div>
          <div class="field" id="mat-width-field" style="display:none">
            <label>Ширина (мм)</label>
            <input type="number" id="mat-width" placeholder="40" min="0">
          </div>
          <div class="field">
            <label>Толщина стенки (мм)</label>
            <input type="number" id="mat-wall" placeholder="3.5" min="0" step="0.1">
          </div>
          <div class="field" style="max-width:120px">
            <label>Остаток (м)</label>
            <input type="number" id="mat-stock" placeholder="0" min="0" step="0.01">
          </div>
        </div>
        <div class="form-row">
          <button class="btn btn-primary" onclick="addMaterial()">Добавить материал</button>
        </div>
        <div id="mat-error" class="error-msg"></div>
      </div>
      <div id="materials-list" class="material-list"></div>
    </div>

    <!-- Изделия -->
    <div class="section">
      <div class="section-title">Изделия</div>
      <div class="form">
        <div class="form-row">
          <div class="field">
            <label>Название изделия</label>
            <input type="text" id="prod-name" placeholder="Например: Рама 2м">
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label>Материал</label>
            <select id="prod-mat-select"></select>
          </div>
          <div class="field" style="max-width:130px">
            <label>Расход (м)</label>
            <input type="number" id="prod-mat-amount" placeholder="1.5" min="0" step="0.01">
          </div>
          <div class="field" style="flex:0; align-self:flex-end">
            <button class="btn btn-ghost" onclick="addMatToProduct()">+ Добавить</button>
          </div>
        </div>
        <div id="prod-materials"></div>
        <div class="form-row" style="margin-top:4px">
          <button class="btn btn-primary" onclick="addProduct()">Создать изделие</button>
        </div>
        <div id="prod-error" class="error-msg"></div>
      </div>
      <div id="products-list" class="product-list"></div>
    </div>

    <!-- Списание -->
    <div class="section">
      <div class="section-title">Списание</div>
      <div class="form">
        <div class="form-row">
          <div class="field">
            <label>Изделие</label>
            <select id="wo-product" onchange="updateWriteoffPreview()"></select>
          </div>
          <div class="field" style="max-width:150px">
            <label>Количество (шт)</label>
            <input type="number" id="wo-qty" placeholder="1" min="1" step="1" oninput="updateWriteoffPreview()">
          </div>
        </div>
        <div id="wo-preview"></div>
        <div class="form-row" style="margin-top:12px">
          <button class="btn btn-primary" onclick="doWriteoff()">Списать</button>
        </div>
        <div id="wo-error" class="error-msg"></div>
        <div id="wo-success" class="success-msg"></div>
      </div>
    </div>

  </div>

  <!-- TAB 2 -->
  <div id="tab-summary" class="tab-content">
    <div class="section">
      <div class="section-title">Сводка</div>
      <div class="stats-grid" id="stats-grid"></div>
    </div>
    <div class="section">
      <div class="section-title">По материалам</div>
      <div id="breakdown-table"></div>
    </div>
    <div class="section">
      <div class="section-title">История списаний</div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<script>
let state = { materials: [], products: [], writeoffs: [] };
let newProductMaterials = [];

function load() {
  try {
    const s = localStorage.getItem('sklad-v1');
    if (s) state = JSON.parse(s);
  } catch(e) {}
}

function save() {
  localStorage.setItem('sklad-v1', JSON.stringify(state));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0) === (tab === 'manage'));
  });
  document.getElementById('tab-manage').classList.toggle('active', tab === 'manage');
  document.getElementById('tab-summary').classList.toggle('active', tab === 'summary');
  if (tab === 'summary') renderSummary();
}

function updateMatFields() {
  const type = document.getElementById('mat-type').value;
  document.getElementById('mat-diameter-field').style.display = type === 'pipe' ? '' : 'none';
  document.getElementById('mat-height-field').style.display = type === 'profile' ? '' : 'none';
  document.getElementById('mat-width-field').style.display = type === 'profile' ? '' : 'none';
}

function matLabel(m) {
  if (!m) return 'удалён';
  if (m.type === 'pipe') return `Труба Ø${m.diameter}×${m.wall}`;
  return `Профиль ${m.height}×${m.width}×${m.wall}`;
}

// Materials

function addMaterial() {
  const type = document.getElementById('mat-type').value;
  const wall = parseFloat(document.getElementById('mat-wall').value);
  const stock = parseFloat(document.getElementById('mat-stock').value) || 0;
  let err = '';

  if (!wall || wall <= 0) { err = 'Укажите толщину стенки'; }

  if (!err) {
    if (type === 'pipe') {
      const diameter = parseFloat(document.getElementById('mat-diameter').value);
      if (!diameter || diameter <= 0) err = 'Укажите диаметр';
      else state.materials.push({ id: genId(), type, diameter, wall, stock });
    } else {
      const height = parseFloat(document.getElementById('mat-height').value);
      const width = parseFloat(document.getElementById('mat-width').value);
      if (!height || !width) err = 'Укажите высоту и ширину';
      else state.materials.push({ id: genId(), type, height, width, wall, stock });
    }
  }

  document.getElementById('mat-error').textContent = err;
  if (err) return;
  save();
  renderMaterials();
  renderProductMatSelect();
  renderWriteoffSelect();
  ['mat-diameter','mat-wall','mat-stock','mat-height','mat-width'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

function adjustStock(id, delta) {
  const m = state.materials.find(m => m.id === id);
  if (!m) return;
  const amount = parseFloat(document.getElementById('si-' + id).value) || 0;
  if (amount <= 0) return;
  m.stock = Math.max(0, Math.round((m.stock + delta * amount) * 1000) / 1000);
  save();
  renderMaterials();
  updateWriteoffPreview();
}

function deleteMaterial(id) {
  state.materials = state.materials.filter(m => m.id !== id);
  save();
  renderMaterials();
  renderProductMatSelect();
  renderWriteoffSelect();
}

function renderMaterials() {
  const el = document.getElementById('materials-list');
  if (!state.materials.length) {
    el.innerHTML = '<div class="empty">Нет материалов — добавьте первый</div>';
    return;
  }
  el.innerHTML = state.materials.map(m => `
    <div class="material-item">
      <div class="material-info">
        <div class="material-name">${matLabel(m)}</div>
      </div>
      <div class="material-stock">
        <button class="stock-btn" onclick="adjustStock('${m.id}',-1)">−</button>
        <input class="stock-input" id="si-${m.id}" type="number" value="1" min="0.01" step="0.01">
        <button class="stock-btn" onclick="adjustStock('${m.id}',1)">+</button>
        <div class="stock-value">${m.stock.toFixed(2)} м</div>
        <button class="btn btn-danger" onclick="deleteMaterial('${m.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

// Products

function renderProductMatSelect() {
  const sel = document.getElementById('prod-mat-select');
  if (!state.materials.length) {
    sel.innerHTML = '<option value="">— сначала добавьте материалы —</option>';
    return;
  }
  sel.innerHTML = state.materials.map(m => `<option value="${m.id}">${matLabel(m)}</option>`).join('');
}

function addMatToProduct() {
  const matId = document.getElementById('prod-mat-select').value;
  const amount = parseFloat(document.getElementById('prod-mat-amount').value);
  if (!matId || !amount || amount <= 0) return;
  const existing = newProductMaterials.findIndex(x => x.matId === matId);
  if (existing >= 0) newProductMaterials[existing].amount = amount;
  else newProductMaterials.push({ matId, amount });
  document.getElementById('prod-mat-amount').value = '';
  renderNewProductMaterials();
}

function removeMatFromProduct(matId) {
  newProductMaterials = newProductMaterials.filter(x => x.matId !== matId);
  renderNewProductMaterials();
}

function renderNewProductMaterials() {
  const el = document.getElementById('prod-materials');
  el.innerHTML = newProductMaterials.map(x => {
    const m = state.materials.find(m => m.id === x.matId);
    return `<div class="added-material">
      <span>${matLabel(m)} — ${x.amount} м</span>
      <button class="btn btn-danger" onclick="removeMatFromProduct('${x.matId}')">✕</button>
    </div>`;
  }).join('');
}

function addProduct() {
  const name = document.getElementById('prod-name').value.trim();
  let err = '';
  if (!name) err = 'Укажите название изделия';
  else if (!newProductMaterials.length) err = 'Добавьте хотя бы один материал';
  document.getElementById('prod-error').textContent = err;
  if (err) return;

  state.products.push({ id: genId(), name, materials: [...newProductMaterials] });
  save();
  newProductMaterials = [];
  document.getElementById('prod-name').value = '';
  renderNewProductMaterials();
  renderProducts();
  renderWriteoffSelect();
}

function deleteProduct(id) {
  state.products = state.products.filter(p => p.id !== id);
  save();
  renderProducts();
  renderWriteoffSelect();
}

function renderProducts() {
  const el = document.getElementById('products-list');
  if (!state.products.length) {
    el.innerHTML = '<div class="empty">Нет изделий — создайте первое</div>';
    return;
  }
  el.innerHTML = state.products.map(p => {
    const comp = p.materials.map(x => {
      const m = state.materials.find(m => m.id === x.matId);
      return `<div class="composition-item"><span>${matLabel(m)}</span><span>${x.amount} м</span></div>`;
    }).join('');
    return `<div class="product-item">
      <div class="product-header">
        <div class="product-name">${p.name}</div>
        <button class="btn btn-danger" onclick="deleteProduct('${p.id}')">✕</button>
      </div>
      <div class="product-composition">${comp}</div>
    </div>`;
  }).join('');
}

// Write-offs

function renderWriteoffSelect() {
  const sel = document.getElementById('wo-product');
  if (!state.products.length) {
    sel.innerHTML = '<option value="">— сначала создайте изделие —</option>';
  } else {
    sel.innerHTML = state.products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  }
  updateWriteoffPreview();
}

function updateWriteoffPreview() {
  const prodId = document.getElementById('wo-product').value;
  const qty = parseFloat(document.getElementById('wo-qty').value) || 1;
  const el = document.getElementById('wo-preview');
  if (!prodId) { el.innerHTML = ''; return; }
  const p = state.products.find(p => p.id === prodId);
  if (!p) { el.innerHTML = ''; return; }

  const rows = p.materials.map(x => {
    const m = state.materials.find(m => m.id === x.matId);
    const total = x.amount * qty;
    const enough = m && m.stock >= total;
    return `<div class="writeoff-preview-item">
      <span>${matLabel(m)}</span>
      <span class="${enough ? '' : 'not-enough'}">${total.toFixed(2)} м${!enough ? ' — недостаточно' : ''}</span>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="writeoff-preview">
    <div class="writeoff-preview-title">Состав на ${qty} шт.</div>
    ${rows}
  </div>`;
}

function doWriteoff() {
  const prodId = document.getElementById('wo-product').value;
  const qty = parseFloat(document.getElementById('wo-qty').value);
  const errEl = document.getElementById('wo-error');
  const okEl = document.getElementById('wo-success');
  errEl.textContent = '';
  okEl.textContent = '';

  if (!prodId) { errEl.textContent = 'Выберите изделие'; return; }
  if (!qty || qty <= 0) { errEl.textContent = 'Укажите количество'; return; }

  const p = state.products.find(p => p.id === prodId);
  if (!p) return;

  for (const x of p.materials) {
    const m = state.materials.find(m => m.id === x.matId);
    if (!m || m.stock < x.amount * qty) {
      errEl.textContent = `Недостаточно: ${matLabel(m)}`;
      return;
    }
  }

  const items = [];
  for (const x of p.materials) {
    const m = state.materials.find(m => m.id === x.matId);
    const meters = Math.round(x.amount * qty * 1000) / 1000;
    m.stock = Math.round((m.stock - meters) * 1000) / 1000;
    items.push({ materialId: m.id, materialName: matLabel(m), meters });
  }

  state.writeoffs.push({
    id: genId(),
    productId: p.id,
    productName: p.name,
    quantity: qty,
    timestamp: Date.now(),
    items
  });

  save();
  renderMaterials();
  updateWriteoffPreview();
  document.getElementById('wo-qty').value = '';
  okEl.textContent = `Списано: ${p.name} × ${qty} шт.`;
  setTimeout(() => { okEl.textContent = ''; }, 3000);
}

// Summary

function renderSummary() {
  const totalItems = state.writeoffs.reduce((s, w) => s + w.quantity, 0);
  const totalMeters = state.writeoffs.reduce((s, w) => s + w.items.reduce((ss, i) => ss + i.meters, 0), 0);

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Списано изделий</div>
      <div class="stat-value">${totalItems}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Материалов (м)</div>
      <div class="stat-value">${totalMeters.toFixed(2)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Операций</div>
      <div class="stat-value">${state.writeoffs.length}</div>
    </div>
  `;

  const breakdown = {};
  for (const w of state.writeoffs) {
    for (const item of w.items) {
      breakdown[item.materialName] = (breakdown[item.materialName] || 0) + item.meters;
    }
  }

  const bEl = document.getElementById('breakdown-table');
  if (!Object.keys(breakdown).length) {
    bEl.innerHTML = '<div class="empty">Списаний пока нет</div>';
  } else {
    bEl.innerHTML = `<table class="breakdown-table">
      <thead><tr><th>Материал</th><th>Списано (м)</th></tr></thead>
      <tbody>${Object.entries(breakdown).map(([name, m]) =>
        `<tr><td>${name}</td><td>${m.toFixed(2)}</td></tr>`
      ).join('')}</tbody>
    </table>`;
  }

  const hEl = document.getElementById('history-list');
  if (!state.writeoffs.length) {
    hEl.innerHTML = '<div class="empty">История пуста</div>';
    return;
  }
  hEl.innerHTML = [...state.writeoffs].reverse().map(w => {
    const date = new Date(w.timestamp).toLocaleString('ru', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
    const detail = w.items.map(i => `${i.materialName}: ${i.meters.toFixed(2)} м`).join(' · ');
    return `<div class="history-item">
      <div class="history-header">
        <div class="history-product">${w.productName} — ${w.quantity} шт.</div>
        <div class="history-meta">${date}</div>
      </div>
      <div class="history-detail">${detail}</div>
    </div>`;
  }).join('');
}

// Init
load();
updateMatFields();
renderMaterials();
renderProductMatSelect();
renderProducts();
renderWriteoffSelect();
</script>
