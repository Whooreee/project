<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Прокситерм</title>
  <style>
    :root {
      --bg: #FFFFFF;
      --bg-soft: #F9F9F8;
      --bg-hover: #F2F1EF;
      --border: #EAEAE8;
      --border-h: #D4D4D1;
      --text: #1C1C1C;
      --text2: #787774;
      --text3: #B0ABA6;
      --black: #1C1C1C;
      --black-h: #37352F;
      --danger: #EB5757;
      --danger-bg: #FFF0F0;
      --success: #27AE60;
      --pipe: #4A90D9;
      --profile: #5CB85C;
      --r: 8px;
      --r-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      --shadow: 0 1px 4px rgba(0,0,0,0.07);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.11);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); font-size: 14px; line-height: 1.5; color: var(--text); background: var(--bg); -webkit-font-smoothing: antialiased; }
    input, select, button, textarea { font-family: var(--font); }
    ::placeholder { color: var(--text3); opacity: 1; }

    /* ── Auth ──────────────────────────────────── */
    .auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .auth-screen.hidden { display: none; }
    .auth-card { width: 100%; max-width: 320px; margin: 16px; padding: 40px 28px; border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-lg); text-align: center; }
    .auth-logo { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
    .auth-sub { font-size: 13px; color: var(--text3); margin-bottom: 28px; }
    .auth-input { width: 100%; padding: 11px 14px; font-size: 18px; letter-spacing: 0.2em; border: 1px solid var(--border); border-radius: var(--r); outline: none; text-align: center; background: var(--bg-soft); margin-bottom: 12px; }
    .auth-input:focus { border-color: var(--border-h); background: var(--bg); }
    .auth-err { color: var(--danger); font-size: 13px; margin-top: 8px; min-height: 18px; }

    /* ── Modal ─────────────────────────────────── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 300; backdrop-filter: blur(2px); }
    .modal-overlay.hidden { display: none; }
    .modal-box { background: var(--bg); border-radius: var(--r-lg); box-shadow: var(--shadow-lg); padding: 28px; width: 100%; max-width: 400px; margin: 16px; }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .modal-body { font-size: 14px; color: var(--text2); margin-bottom: 24px; line-height: 1.6; }
    .modal-body input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--r); outline: none; font-size: 14px; margin-top: 10px; }
    .modal-body input:focus { border-color: var(--border-h); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* ── App layout ────────────────────────────── */
    .app { max-width: 1080px; margin: 0 auto; padding: 0 24px 100px; }
    .header { display: flex; justify-content: space-between; align-items: baseline; padding: 32px 0 0; margin-bottom: 20px; }
    .header-title { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); display: inline-block; margin-right: 5px; vertical-align: middle; }
    .sync-dot.ok { background: var(--success); }
    #sync-status { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }

    /* ── Tabs ──────────────────────────────────── */
    .tabs { display: flex; border-bottom: 1.5px solid var(--border); overflow: hidden; margin-bottom: 0; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { padding: 9px 20px; font-size: 13px; font-weight: 500; color: var(--text2); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1.5px; white-space: nowrap; transition: color 0.13s; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Two column ────────────────────────────── */
    .two-col { display: grid; grid-template-columns: 1fr 300px; gap: 28px; align-items: start; padding-top: 28px; }
    .col-main { min-width: 0; }

    /* ── Island ────────────────────────────────── */
    .island { position: sticky; top: 24px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 20px; }
    .island-title { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 16px; }
    .island-empty { font-size: 13px; color: var(--text3); text-align: center; padding: 12px 0; }
    .island-row { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .island-row:last-child { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }
    .island-mat-name { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .island-bar-wrap { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 3px; }
    .island-bar { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .island-meta { font-size: 11px; color: var(--text3); display: flex; justify-content: space-between; }
    .island-stock-val { font-size: 13px; font-weight: 600; color: var(--text); }
    .island-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .island-total { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); }

    /* ── Section ───────────────────────────────── */
    .section { margin-bottom: 32px; }
    .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); }

    /* ── Form block ────────────────────────────── */
    .form-block { background: var(--bg-soft); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 20px 20px 16px; margin-bottom: 20px; }
    .form-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
    .field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 88px; }
    .field.narrow { max-width: 120px; }
    .field label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); }
    .field input, .field select { padding: 8px 11px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--r); background: var(--bg); color: var(--text); outline: none; transition: border-color 0.13s, box-shadow 0.13s; }
    .field input:focus, .field select:focus { border-color: var(--border-h); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
    .form-actions { display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border); margin-top: 12px; flex-wrap: wrap; }

    /* ── Buttons ───────────────────────────────── */
    .btn { font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: var(--r); border: 1px solid transparent; cursor: pointer; transition: all 0.12s; line-height: 1.4; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
    .btn-primary { background: var(--black); color: #fff; border-color: var(--black); }
    .btn-primary:hover { background: var(--black-h); }
    .btn-secondary { background: var(--bg); color: var(--text); border-color: var(--border); }
    .btn-secondary:hover { background: var(--bg-hover); border-color: var(--border-h); }
    .btn-ghost { background: transparent; color: var(--text2); border-color: transparent; padding: 6px 10px; font-size: 12px; }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text); }
    .btn-danger { background: transparent; color: var(--danger); border-color: transparent; padding: 6px 10px; font-size: 12px; }
    .btn-danger:hover { background: var(--danger-bg); }
    .btn-sm { padding: 5px 11px; font-size: 12px; }

    /* ── Badge / Tag ───────────────────────────── */
    .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.03em; }
    .badge-pipe { background: #E8F0FD; color: #2D6CC4; }
    .badge-profile { background: #E8F7EE; color: #1E7A3C; }

    /* ── Material cards ────────────────────────── */
    .mat-list { display: flex; flex-direction: column; gap: 10px; }
    .mat-card { border: 1px solid var(--border); border-radius: var(--r-lg); background: var(--bg); overflow: hidden; transition: border-color 0.13s; }
    .mat-card:hover { border-color: var(--border-h); }
    .mat-card-top { display: flex; align-items: center; gap: 12px; padding: 16px 18px; }
    .mat-card-info { flex: 1; min-width: 0; }
    .mat-card-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .mat-card-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .mat-card-stock { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
    .mat-card-unit { font-size: 12px; color: var(--text3); font-weight: 400; margin-left: 2px; }
    .mat-edit-row { display: flex; align-items: center; gap: 8px; padding: 0 18px 16px; }
    .mat-edit-row input { flex: 1; padding: 8px 11px; font-size: 14px; border: 1px solid var(--border); border-radius: var(--r); outline: none; }
    .mat-edit-row input:focus { border-color: var(--border-h); }

    /* ── Product cards ─────────────────────────── */
    .prod-list { display: flex; flex-direction: column; gap: 8px; }
    .prod-card { border: 1px solid var(--border); border-radius: var(--r-lg); background: var(--bg); overflow: hidden; }
    .prod-card:hover { border-color: var(--border-h); }
    .prod-card-top { display: flex; align-items: center; gap: 12px; padding: 14px 16px; }
    .prod-card-name { font-size: 14px; font-weight: 500; flex: 1; }
    .prod-card-body { padding: 0 16px 14px; border-top: 1px solid var(--border); padding-top: 10px; }
    .comp-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text2); padding: 3px 0; }
    .comp-val { font-weight: 500; color: var(--text); }
    .added-mat { display: flex; justify-content: space-between; align-items: center; padding: 7px 11px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 6px; font-size: 13px; color: var(--text2); }

    /* ── Input wrap with icons ─────────────────── */
    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-wrap .ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; display: flex; line-height: 1; }
    .input-wrap input, .input-wrap select { padding-left: 32px; width: 100%; }
    select { appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23B0ABA6' stroke-width='2.5'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 10px center; padding-right: 32px; }

    /* ── Writeoff form ─────────────────────────── */
    .wo-item-row { display: flex; align-items: flex-end; gap: 10px; padding: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-lg); margin-bottom: 8px; flex-wrap: wrap; }
    .wo-item-row .field { min-width: 140px; }
    .wo-item-row .field.narrow { max-width: 100px; }
    .wo-preview { margin-top: 12px; padding: 14px 16px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: var(--r-lg); }
    .wo-preview-title { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
    .wo-preview-item { display: flex; justify-content: space-between; font-size: 13px; color: var(--text2); padding: 3px 0; }
    .wo-preview-mat { font-size: 12px; color: var(--text3); padding: 2px 0 2px 12px; }
    .not-enough { color: var(--danger) !important; }
    .wo-add-btn { margin-bottom: 16px; }

    /* ── Summary / Итог ────────────────────────── */
    .stat-row { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-card { flex: 1; min-width: 120px; padding: 18px 20px; border: 1px solid var(--border); border-radius: var(--r-lg); background: var(--bg-soft); }
    .stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 6px; }
    .stat-val { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .chart-section { margin-bottom: 28px; }
    .chart-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 14px; }
    .chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
    .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .chart-bar-fill { width: 100%; border-radius: 4px 4px 0 0; background: var(--text); opacity: 0.12; min-height: 3px; transition: height 0.3s; }
    .chart-bar-fill.has-data { opacity: 0.85; background: var(--black); }
    .chart-day-label { font-size: 10px; color: var(--text3); text-align: center; }
    .chart-day-val { font-size: 11px; font-weight: 600; color: var(--text2); }

    /* ── Day navigation ────────────────────────── */
    .day-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .day-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .day-table th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 2px solid var(--border); }
    .day-table td { padding: 11px 12px; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: top; }
    .day-table tbody tr:last-child td { border-bottom: none; }
    .day-table td:first-child { color: var(--text3); white-space: nowrap; }

    /* ── Writeoff chips ────────────────────────── */
    .wo-mat-chip { font-size: 11px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; color: var(--text2); }

    /* ── Empty state ───────────────────────────── */
    .empty { padding: 28px 20px; text-align: center; color: var(--text3); font-size: 13px; border: 1px dashed var(--border); border-radius: var(--r-lg); }

    /* ── Error / OK ────────────────────────────── */
    .err { font-size: 12px; color: var(--danger); margin-top: 0; min-height: 0; width: 100%; }
    .ok-msg { font-size: 12px; color: var(--success); margin-top: 0; min-height: 0; width: 100%; }

    /* ── Responsive ────────────────────────────── */
    @media (max-width: 800px) {
      .two-col { grid-template-columns: 1fr; }
      .island { position: static; }
    }
    @media (max-width: 600px) {
      .app { padding: 0 14px 80px; }
      .header { padding-top: 20px; margin-bottom: 14px; }
      .header-title { font-size: 20px; }
      .tab-btn { padding: 8px 14px; font-size: 12px; }
      .two-col { padding-top: 18px; gap: 18px; }
      .form-block { padding: 14px 14px 12px; }
      .form-grid { gap: 10px; }
      .field { min-width: 100%; }
      .field.narrow { max-width: 100%; }
      .field input, .field select { font-size: 16px; padding: 10px 12px; min-height: 44px; }
      .btn-primary, .btn-secondary { min-height: 44px; padding: 10px 16px; }
      .mat-card-stock { font-size: 17px; }
      .stat-val { font-size: 22px; }
      .wo-item-row .field { min-width: 100%; }
    }
  </style>
</head>
<body>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box">
    <div id="modal-title" class="modal-title"></div>
    <div id="modal-body" class="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="hideModal()">Отмена</button>
      <button id="modal-confirm-btn" class="btn btn-primary" onclick="confirmModal()">Подтвердить</button>
    </div>
  </div>
</div>

<!-- Auth -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Прокситерм</div>
    <div class="auth-sub">Введите пароль для входа</div>
    <input type="password" id="auth-input" class="auth-input" placeholder="••••"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Войти</button>
    <div id="auth-err" class="auth-err"></div>
  </div>
</div>

<!-- App -->
<div class="app">
  <div class="header">
    <div class="header-title">Прокситерм</div>
    <div id="sync-status"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">—</span></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('sklad')">Склад</button>
    <button class="tab-btn" onclick="switchTab('products')">Изделия</button>
    <button class="tab-btn" onclick="switchTab('writeoffs')">Списания</button>
    <button class="tab-btn" onclick="switchTab('summary')">Итог</button>
  </div>

  <!-- ═══ СКЛАД ════════════════════════════════════════════════════════ -->
  <div id="tab-sklad" class="tab-pane active">
    <div class="two-col">
      <div class="col-main">

        <div class="form-block">
          <div class="section-label" style="margin-bottom:16px">Добавить материал</div>
          <div class="form-grid">
            <div class="field narrow">
              <label>Тип</label>
              <div class="input-wrap">
                <span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></span>
                <select id="mat-type" onchange="updateMatFields()">
                  <option value="pipe">Труба</option>
                  <option value="profile">Профиль</option>
                </select>
              </div>
            </div>
            <div class="field" id="f-diam">
              <label>Диаметр (мм)</label>
              <div class="input-wrap">
                <span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg></span>
                <input type="number" id="mat-diameter" placeholder="Введите диаметр" min="0">
              </div>
            </div>
            <div class="field" id="f-h" style="display:none">
              <label>Высота (мм)</label>
              <div class="input-wrap">
                <span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg></span>
                <input type="number" id="mat-height" placeholder="Введите высоту" min="0">
              </div>
            </div>
            <div class="field" id="f-w" style="display:none">
              <label>Ширина (мм)</label>
              <div class="input-wrap">
                <span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg></span>
                <input type="number" id="mat-width" placeholder="Введите ширину" min="0">
              </div>
            </div>
            <div class="field narrow">
              <label>Стенка (мм)</label>
              <div class="input-wrap">
                <span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg></span>
                <input type="number" id="mat-wall" placeholder="Введите толщину" min="0" step="0.1">
              </div>
            </div>
            <div class="field narrow">
              <label>Остаток (м)</label>
              <div class="input-wrap">
                <span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></span>
                <input type="number" id="mat-stock" placeholder="Введите остаток" min="0" step="0.01">
              </div>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" onclick="addMaterial()">+ Добавить материал</button>
            <div id="mat-err" class="err"></div>
          </div>
        </div>

        <div class="section">
          <div class="section-head">
            <div class="section-label">Материалы</div>
          </div>
          <div id="materials-list" class="mat-list"></div>
        </div>
      </div>

      <div class="island">
        <div class="island-title">Складской остаток</div>
        <div id="island-mats-1"></div>
      </div>
    </div>
  </div>

  <!-- ═══ ИЗДЕЛИЯ ══════════════════════════════════════════════════════ -->
  <div id="tab-products" class="tab-pane">
    <div class="two-col">
      <div class="col-main">

        <div class="form-block">
          <div class="section-label" style="margin-bottom:16px">Создать изделие</div>
          <div class="form-grid">
            <div class="field" style="min-width:200px">
              <label>Название</label>
              <div class="input-wrap">
                <span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4z"/></svg></span>
                <input type="text" id="prod-name" placeholder="Введите название">
              </div>
            </div>
          </div>
          <div class="form-grid" id="prod-mat-form-row" style="align-items:flex-end">
            <div class="field">
              <label>Материал</label>
              <div class="input-wrap">
                <span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
                <select id="prod-mat-select"></select>
              </div>
            </div>
            <div class="field narrow">
              <label>Расход (м)</label>
              <div class="input-wrap">
                <span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg></span>
                <input type="number" id="prod-mat-qty" placeholder="Введите расход" min="0" step="0.01">
              </div>
            </div>
            <div class="field" style="flex:0;min-width:auto;justify-content:flex-end">
              <label style="visibility:hidden">add</label>
              <button class="btn btn-secondary btn-sm" onclick="addMatToProduct()">+ Материал</button>
            </div>
          </div>
          <div id="prod-mats-list"></div>
          <div class="form-actions">
            <button class="btn btn-primary" onclick="addProduct()">Создать изделие</button>
            <div id="prod-err" class="err"></div>
          </div>
        </div>

        <div class="section">
          <div class="section-head">
            <div class="section-label">Изделия</div>
          </div>
          <div id="products-list" class="prod-list"></div>
        </div>
      </div>

      <div class="island">
        <div class="island-title">Складской остаток</div>
        <div id="island-mats-2"></div>
      </div>
    </div>
  </div>

  <!-- ═══ СПИСАНИЯ ══════════════════════════════════════════════════════ -->
  <div id="tab-writeoffs" class="tab-pane" style="padding-top:28px">
    <div class="form-block">
      <div class="section-label" style="margin-bottom:16px">Списание изделий</div>
      <div id="wo-items-list"></div>
      <button class="btn btn-secondary btn-sm wo-add-btn" onclick="addWoItem()">+ Добавить изделие</button>
      <div id="wo-preview"></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="doWriteoff()">Списать</button>
        <div id="wo-err" class="err"></div>
        <div id="wo-ok" class="ok-msg"></div>
      </div>
    </div>
  </div>

  <!-- ═══ ИТОГ ══════════════════════════════════════════════════════════ -->
  <div id="tab-summary" class="tab-pane" style="padding-top:28px">
    <div class="stat-row" id="stat-row"></div>
    <div class="chart-section">
      <div class="chart-title">Списания за 7 дней</div>
      <div class="chart-bars" id="chart-bars"></div>
    </div>
    <div class="day-nav">
      <button class="btn btn-secondary btn-sm" onclick="prevSummaryDay()">&#8249; Назад</button>
      <span id="day-nav-label" style="font-size:13px;font-weight:500;min-width:120px;text-align:center"></span>
      <button class="btn btn-secondary btn-sm" id="day-nav-next" onclick="nextSummaryDay()">Вперёд &#8250;</button>
    </div>
    <div id="day-table-wrap" style="margin-top:16px"></div>
  </div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────
const PASSWORD  = '1488';
const CLOUD_DB  = 'https://proxytherm-e2db4-default-rtdb.firebaseio.com';
const STORE_KEY = 'sklad-v1';

// ── State ────────────────────────────────────────────────────────────────
let state = { materials: [], products: [], writeoffs: [] };
let newProdMats  = [];   // materials being added to a new product
let editProdMats = [];   // materials in the product being edited
let woItems      = [{ prodId: '', qty: 1 }]; // writeoff items
let modalCallback = null;

let summaryDay = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();

function normalizeState(s) {
  if (!s || typeof s !== 'object') return { materials: [], products: [], writeoffs: [] };
  return {
    materials: Array.isArray(s.materials) ? s.materials : [],
    products:  Array.isArray(s.products)  ? s.products  : [],
    writeoffs: Array.isArray(s.writeoffs) ? s.writeoffs : [],
  };
}

// ── Modal ────────────────────────────────────────────────────────────────
function showModal(title, body, onConfirm, confirmLabel = 'Подтвердить', danger = false) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  const btn = document.getElementById('modal-confirm-btn');
  btn.textContent = confirmLabel;
  btn.className = 'btn ' + (danger ? 'btn-danger' : 'btn-primary');
  btn.style.background = danger ? '' : '';
  modalCallback = onConfirm;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function hideModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  modalCallback = null;
}
function confirmModal() {
  hideModal();
  if (modalCallback) modalCallback();
}

// ── Auth ─────────────────────────────────────────────────────────────────
function doLogin() {
  const val = document.getElementById('auth-input').value;
  if (val === PASSWORD) {
    sessionStorage.setItem('sklad-auth', '1');
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('auth-input').value = '';
    initApp();
  } else {
    const el = document.getElementById('auth-err');
    el.textContent = 'Неверный пароль';
    document.getElementById('auth-input').value = '';
    setTimeout(() => el.textContent = '', 2000);
  }
}

// ── Tabs ─────────────────────────────────────────────────────────────────
function switchTab(name) {
  const names = ['sklad','products','writeoffs','summary'];
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', names[i] === name));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ── Storage ───────────────────────────────────────────────────────────────
function loadLocal() {
  try { const s = localStorage.getItem(STORE_KEY); if (s) state = normalizeState(JSON.parse(s)); } catch(e) {}
}
function saveLocal() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

async function loadCloud() {
  try {
    const res = await fetch(`${CLOUD_DB}/${STORE_KEY}.json`);
    if (!res.ok) return 'error';
    const data = await res.json();
    if (data && typeof data === 'object') { state = normalizeState(data); return 'loaded'; }
    return 'empty';
  } catch { return 'error'; }
}
async function saveCloud() {
  try {
    const res = await fetch(`${CLOUD_DB}/${STORE_KEY}.json`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(state)
    });
    return res.ok;
  } catch { return false; }
}

function setSyncStatus(ok, text) {
  document.getElementById('sync-dot').className = 'sync-dot' + (ok ? ' ok' : '');
  document.getElementById('sync-text').textContent = text;
}

function save() {
  saveLocal();
  saveCloud().then(ok => setSyncStatus(ok,
    ok ? 'Синхронизировано ' + new Date().toLocaleTimeString('ru', { hour:'2-digit', minute:'2-digit' })
       : 'Нет связи'));
  renderAll();
}

// ── Helpers ───────────────────────────────────────────────────────────────
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function matLabel(m) {
  if (!m) return 'удалён';
  return m.type === 'pipe' ? `Труба Ø${m.diameter}×${m.wall}` : `Профиль ${m.height}×${m.width}×${m.wall}`;
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Material fields ───────────────────────────────────────────────────────
function updateMatFields() {
  const t = document.getElementById('mat-type').value;
  document.getElementById('f-diam').style.display = t === 'pipe' ? '' : 'none';
  document.getElementById('f-h').style.display = t === 'profile' ? '' : 'none';
  document.getElementById('f-w').style.display = t === 'profile' ? '' : 'none';
}

// ── Materials CRUD ────────────────────────────────────────────────────────
function addMaterial() {
  const type = document.getElementById('mat-type').value;
  const wall = parseFloat(document.getElementById('mat-wall').value);
  const stock = parseFloat(document.getElementById('mat-stock').value) || 0;
  const errEl = document.getElementById('mat-err');
  if (!wall || wall <= 0) { errEl.textContent = 'Укажите толщину стенки'; return; }
  const mat = { id: genId(), type, wall, stock };
  if (type === 'pipe') {
    const d = parseFloat(document.getElementById('mat-diameter').value);
    if (!d || d <= 0) { errEl.textContent = 'Укажите диаметр'; return; }
    mat.diameter = d;
  } else {
    const h = parseFloat(document.getElementById('mat-height').value);
    const w = parseFloat(document.getElementById('mat-width').value);
    if (!h || !w) { errEl.textContent = 'Укажите высоту и ширину'; return; }
    mat.height = h; mat.width = w;
  }
  errEl.textContent = '';
  state.materials.push(mat);
  save();
  ['mat-diameter','mat-wall','mat-stock','mat-height','mat-width'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
}

function renderMaterials() {
  const el = document.getElementById('materials-list');
  if (!state.materials.length) { el.innerHTML = '<div class="empty">Нет материалов — добавьте первый</div>'; return; }
  el.innerHTML = state.materials.map(m => `
    <div class="mat-card" id="mc-${m.id}">
      <div class="mat-card-top">
        <div class="mat-card-info">
          <div style="margin-bottom:4px"><span class="badge ${m.type==='pipe'?'badge-pipe':'badge-profile'}">${m.type==='pipe'?'Труба':'Профиль'}</span></div>
          <div class="mat-card-name">${esc(matLabel(m))}</div>
          <div style="margin-top:6px">
            <span class="mat-card-stock">${m.stock.toFixed(2)}</span>
            <span class="mat-card-unit">м</span>
          </div>
        </div>
        <div class="mat-card-actions">
          <button class="btn btn-ghost btn-sm" onclick="startEditMat('${m.id}')">Изменить</button>
          <button class="btn btn-danger btn-sm" onclick="askDeleteMat('${m.id}')">Удалить</button>
        </div>
      </div>
      <div class="mat-edit-row" id="me-${m.id}" style="display:none">
        <input type="number" id="mei-${m.id}" value="${m.stock}" min="0" step="0.01" placeholder="Введите остаток" onkeydown="if(event.key==='Enter') askSaveMat('${m.id}')">
        <button class="btn btn-primary btn-sm" onclick="askSaveMat('${m.id}')">Сохранить</button>
        <button class="btn btn-ghost btn-sm" onclick="cancelEditMat('${m.id}')">Отмена</button>
      </div>
    </div>
  `).join('');
}

function startEditMat(id) {
  document.getElementById('me-' + id).style.display = 'flex';
  const inp = document.getElementById('mei-' + id);
  inp.focus(); inp.select();
}
function cancelEditMat(id) { document.getElementById('me-' + id).style.display = 'none'; }

function askSaveMat(id) {
  const val = parseFloat(document.getElementById('mei-' + id).value);
  if (isNaN(val) || val < 0) return;
  showModal('Изменить остаток', `Установить остаток: <b>${val.toFixed(2)} м</b>?`, () => {
    const m = state.materials.find(m => m.id === id);
    if (m) { m.stock = val; save(); }
  }, 'Сохранить');
}

function askDeleteMat(id) {
  const m = state.materials.find(m => m.id === id);
  showModal('Удалить материал', `Удалить <b>${esc(matLabel(m))}</b>? Это действие нельзя отменить.`, () => {
    state.materials = state.materials.filter(m => m.id !== id);
    save();
  }, 'Удалить', true);
}

// ── Island infographic ─────────────────────────────────────────────────────
const ISLAND_COLORS = ['#4A90D9','#5CB85C','#E67E22','#9B59B6','#1ABC9C','#E74C3C','#3498DB','#F39C12'];

function renderIsland(elId) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (!state.materials.length) { el.innerHTML = '<div class="island-empty">Нет материалов</div>'; return; }
  const maxStock = Math.max(...state.materials.map(m => m.stock), 0.001);
  const totalMeters = state.materials.reduce((s, m) => s + m.stock, 0);
  el.innerHTML = state.materials.map((m, i) => {
    const pct = Math.round(m.stock / maxStock * 100);
    const color = ISLAND_COLORS[i % ISLAND_COLORS.length];
    return `
      <div class="island-row">
        <div class="island-mat-name">
          <span class="badge ${m.type==='pipe'?'badge-pipe':'badge-profile'}" style="font-size:9px">${m.type==='pipe'?'Т':'П'}</span>
          ${esc(matLabel(m))}
        </div>
        <div class="island-bar-wrap">
          <div class="island-bar" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="island-meta">
          <span>${pct}%</span>
          <span class="island-stock-val">${m.stock.toFixed(2)} м</span>
        </div>
      </div>`;
  }).join('') + `
    <hr class="island-divider">
    <div class="island-total"><span>Итого</span><span style="font-weight:600">${totalMeters.toFixed(2)} м</span></div>`;
}

// ── Products CRUD ─────────────────────────────────────────────────────────
function renderProdMatSelect(selId) {
  const sel = document.getElementById(selId);
  if (!sel) return;
  sel.innerHTML = state.materials.length
    ? state.materials.map(m => `<option value="${m.id}">${esc(matLabel(m))}</option>`).join('')
    : '<option value="">— сначала добавьте материалы —</option>';
}

function addMatToProduct() {
  const matId = document.getElementById('prod-mat-select').value;
  const qty = parseFloat(document.getElementById('prod-mat-qty').value);
  if (!matId || !qty || qty <= 0) return;
  const i = newProdMats.findIndex(x => x.matId === matId);
  if (i >= 0) newProdMats[i].qty = qty; else newProdMats.push({ matId, qty });
  document.getElementById('prod-mat-qty').value = '';
  renderNewProdMats();
}

function removeNewProdMat(matId) {
  newProdMats = newProdMats.filter(x => x.matId !== matId);
  renderNewProdMats();
}

function renderNewProdMats() {
  document.getElementById('prod-mats-list').innerHTML = newProdMats.map(x => {
    const m = state.materials.find(m => m.id === x.matId);
    return `<div class="added-mat">
      <span>${esc(matLabel(m))} — расход: <b>${x.qty} м</b></span>
      <button class="btn btn-danger btn-sm" onclick="removeNewProdMat('${x.matId}')">✕</button>
    </div>`;
  }).join('');
}

function addProduct() {
  const name = document.getElementById('prod-name').value.trim();
  const errEl = document.getElementById('prod-err');
  if (!name) { errEl.textContent = 'Укажите название'; return; }
  if (!newProdMats.length) { errEl.textContent = 'Добавьте хотя бы один материал'; return; }
  errEl.textContent = '';
  state.products.push({ id: genId(), name, materials: [...newProdMats] });
  newProdMats = [];
  document.getElementById('prod-name').value = '';
  renderNewProdMats();
  save();
}

function renderProducts() {
  const el = document.getElementById('products-list');
  if (!state.products.length) { el.innerHTML = '<div class="empty">Нет изделий — создайте первое</div>'; return; }
  el.innerHTML = state.products.map(p => `
    <div class="prod-card">
      <div class="prod-card-top">
        <div class="prod-card-name">${esc(p.name)}</div>
        <div style="display:flex;gap:4px">
          <button class="btn btn-ghost btn-sm" onclick="startEditProduct('${p.id}')">Редактировать</button>
          <button class="btn btn-danger btn-sm" onclick="askDeleteProduct('${p.id}')">Удалить</button>
        </div>
      </div>
      <div class="prod-card-body">
        ${p.materials.map(x => {
          const m = state.materials.find(m => m.id === x.matId);
          return `<div class="comp-row"><span>${esc(matLabel(m))}</span><span class="comp-val">расход: ${x.qty} м</span></div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function askDeleteProduct(id) {
  const p = state.products.find(p => p.id === id);
  showModal('Удалить изделие', `Удалить <b>${esc(p.name)}</b>? Это действие нельзя отменить.`, () => {
    state.products = state.products.filter(p => p.id !== id);
    save();
  }, 'Удалить', true);
}

function startEditProduct(id) {
  const p = state.products.find(p => p.id === id);
  if (!p) return;
  editProdMats = p.materials.map(x => ({ ...x }));
  const matOptions = state.materials.map(m => `<option value="${m.id}">${esc(matLabel(m))}</option>`).join('');
  const matsHtml = () => editProdMats.map(x => {
    const m = state.materials.find(m => m.id === x.matId);
    return `<div class="added-mat" id="epm-${x.matId}">
      <span>${esc(matLabel(m))} — расход: <b>${x.qty} м</b></span>
      <button class="btn btn-danger btn-sm" onclick="removeEditProdMat('${x.matId}')">✕</button>
    </div>`;
  }).join('');

  const bodyHtml = `
    <label style="display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Название</label>
    <input id="edit-prod-name" value="${esc(p.name)}" placeholder="Название изделия">
    <div style="margin-top:14px;margin-bottom:6px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Состав</div>
    <div id="edit-prod-mats">${matsHtml()}</div>
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
      <select id="edit-mat-sel" style="flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px">${matOptions}</select>
      <input type="number" id="edit-mat-qty" placeholder="м" min="0" step="0.01" style="width:80px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px">
      <button class="btn btn-secondary btn-sm" onclick="addEditProdMat()">+</button>
    </div>
  `;

  showModal('Редактировать изделие', bodyHtml, () => {
    const newName = document.getElementById('edit-prod-name')?.value.trim();
    if (!newName) return;
    const idx = state.products.findIndex(p => p.id === id);
    if (idx >= 0) { state.products[idx].name = newName; state.products[idx].materials = [...editProdMats]; }
    save();
  }, 'Сохранить');
}

function refreshEditProdMats() {
  const el = document.getElementById('edit-prod-mats');
  if (!el) return;
  el.innerHTML = editProdMats.map(x => {
    const m = state.materials.find(m => m.id === x.matId);
    return `<div class="added-mat">
      <span>${esc(matLabel(m))} — расход: <b>${x.qty} м</b></span>
      <button class="btn btn-danger btn-sm" onclick="removeEditProdMat('${x.matId}')">✕</button>
    </div>`;
  }).join('');
}

function addEditProdMat() {
  const matId = document.getElementById('edit-mat-sel')?.value;
  const qty = parseFloat(document.getElementById('edit-mat-qty')?.value);
  if (!matId || !qty || qty <= 0) return;
  const i = editProdMats.findIndex(x => x.matId === matId);
  if (i >= 0) editProdMats[i].qty = qty; else editProdMats.push({ matId, qty });
  document.getElementById('edit-mat-qty').value = '';
  refreshEditProdMats();
}

function removeEditProdMat(matId) {
  editProdMats = editProdMats.filter(x => x.matId !== matId);
  refreshEditProdMats();
}

// ── Writeoffs ─────────────────────────────────────────────────────────────
function renderWoItems() {
  const el = document.getElementById('wo-items-list');
  if (!state.products.length) {
    el.innerHTML = '<div class="empty" style="margin-bottom:12px">Сначала создайте изделия</div>';
    return;
  }
  el.innerHTML = woItems.map((item, i) => `
    <div class="wo-item-row">
      <div class="field">
        <label>Изделие</label>
        <div class="input-wrap">
          <span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></span>
          <select onchange="woItems[${i}].prodId=this.value;updateWoPreview()">
            <option value="">— выберите —</option>
            ${state.products.map(p => `<option value="${p.id}" ${item.prodId===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field narrow">
        <label>Кол-во (шт)</label>
        <div class="input-wrap">
          <span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span>
          <input type="number" min="1" step="1" value="${item.qty||''}" placeholder="Введите кол-во"
            oninput="woItems[${i}].qty=parseFloat(this.value)||0;updateWoPreview()">
        </div>
      </div>
      ${woItems.length > 1 ? `<div style="padding-bottom:2px"><button class="btn btn-danger btn-sm" onclick="removeWoItem(${i})">✕</button></div>` : ''}
    </div>
  `).join('');
  updateWoPreview();
}

function addWoItem() { woItems.push({ prodId: '', qty: 1 }); renderWoItems(); }
function removeWoItem(i) { woItems.splice(i, 1); renderWoItems(); }

function updateWoPreview() {
  const el = document.getElementById('wo-preview');
  const validItems = woItems.filter(x => x.prodId && x.qty > 0);
  if (!validItems.length) { el.innerHTML = ''; return; }

  // Aggregate material needs
  const needs = {};
  let allOk = true;
  for (const item of validItems) {
    const p = state.products.find(p => p.id === item.prodId);
    if (!p) continue;
    for (const x of p.materials) {
      if (!needs[x.matId]) needs[x.matId] = 0;
      needs[x.matId] += x.qty * item.qty;
    }
  }

  const rows = validItems.map(item => {
    const p = state.products.find(p => p.id === item.prodId);
    if (!p) return '';
    const matRows = p.materials.map(x => {
      const m = state.materials.find(m => m.id === x.matId);
      const total = x.qty * item.qty;
      const ok = m && m.stock >= needs[x.matId];
      if (!ok) allOk = false;
      return `<div class="wo-preview-mat ${ok?'':'not-enough'}">${esc(matLabel(m))}: ${total.toFixed(2)} м${ok?'':' — недостаточно'}</div>`;
    }).join('');
    return `<div class="wo-preview-item"><b>${esc(p.name)} × ${item.qty} шт.</b></div>${matRows}`;
  }).join('');

  el.innerHTML = `<div class="wo-preview"><div class="wo-preview-title">Предварительный расчёт</div>${rows}</div>`;
}

function doWriteoff() {
  const errEl = document.getElementById('wo-err');
  const okEl = document.getElementById('wo-ok');
  errEl.textContent = ''; okEl.textContent = '';

  const validItems = woItems.filter(x => x.prodId && x.qty > 0);
  if (!validItems.length) { errEl.textContent = 'Добавьте хотя бы одно изделие'; return; }

  // Check all stocks
  const needs = {};
  for (const item of validItems) {
    const p = state.products.find(p => p.id === item.prodId);
    if (!p) continue;
    for (const x of p.materials) {
      if (!needs[x.matId]) needs[x.matId] = 0;
      needs[x.matId] += x.qty * item.qty;
    }
  }
  for (const [matId, total] of Object.entries(needs)) {
    const m = state.materials.find(m => m.id === matId);
    if (!m || m.stock < total) { errEl.textContent = `Недостаточно материала: ${matLabel(m)}`; return; }
  }

  // Deduct
  for (const [matId, total] of Object.entries(needs)) {
    const m = state.materials.find(m => m.id === matId);
    m.stock = Math.round((m.stock - total) * 1000) / 1000;
  }

  // Record writeoffs
  for (const item of validItems) {
    const p = state.products.find(p => p.id === item.prodId);
    const items = p.materials.map(x => {
      const m = state.materials.find(m => m.id === x.matId);
      return { materialId: x.matId, materialName: matLabel(m), meters: Math.round(x.qty * item.qty * 1000) / 1000 };
    });
    state.writeoffs.push({ id: genId(), productId: p.id, productName: p.name, quantity: item.qty, timestamp: Date.now(), items });
  }

  const names = validItems.map(x => {
    const p = state.products.find(p => p.id === x.prodId);
    return `${p?.name} × ${x.qty}`;
  }).join(', ');
  woItems = [{ prodId: '', qty: 1 }];
  save();
  okEl.textContent = `Списано: ${names}`;
  setTimeout(() => okEl.textContent = '', 4000);
}

// ── Day navigation ─────────────────────────────────────────────────────────
function prevSummaryDay() { summaryDay = new Date(summaryDay - 86400000); renderDayHistory(); }
function nextSummaryDay() {
  const next = new Date(summaryDay.getTime() + 86400000);
  const today = new Date(); today.setHours(0,0,0,0);
  if (next <= today) { summaryDay = next; renderDayHistory(); }
}
function renderDayHistory() {
  const today = new Date(); today.setHours(0,0,0,0);
  const isToday = summaryDay.getTime() === today.getTime();
  const isYest = summaryDay.getTime() === today.getTime() - 86400000;
  const label = isToday ? 'Сегодня' : isYest ? 'Вчера' : summaryDay.toLocaleDateString('ru', {day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('day-nav-label').textContent = label;
  const nextBtn = document.getElementById('day-nav-next');
  if (nextBtn) nextBtn.disabled = isToday;

  const dayWOs = state.writeoffs.filter(w => {
    if (!state.products.find(p => p.id === w.productId)) return false;
    const d = new Date(w.timestamp); d.setHours(0,0,0,0);
    return d.getTime() === summaryDay.getTime();
  });

  const wrap = document.getElementById('day-table-wrap');
  if (!dayWOs.length) { wrap.innerHTML = '<div class="empty">Списаний за этот день нет</div>'; return; }

  const rows = dayWOs.map(w => {
    const time = new Date(w.timestamp).toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'});
    const mats = w.items.map(i => `<span class="wo-mat-chip">${esc(i.materialName)}: ${i.meters.toFixed(2)} м</span>`).join(' ');
    return `<tr><td>${time}</td><td style="font-weight:500">${esc(w.productName)}</td><td>${w.quantity} шт.</td><td>${mats}</td></tr>`;
  }).join('');

  wrap.innerHTML = `<table class="day-table">
    <thead><tr><th>Время</th><th>Изделие</th><th>Кол-во</th><th>Состав</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── Summary ────────────────────────────────────────────────────────────────
function renderSummary() {
  const total = state.writeoffs.reduce((s, w) => s + w.quantity, 0);
  const totalM = state.writeoffs.reduce((s, w) => s + w.items.reduce((ss, i) => ss + i.meters, 0), 0);
  document.getElementById('stat-row').innerHTML = `
    <div class="stat-card"><div class="stat-label">Списано изделий</div><div class="stat-val">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Материалов (м)</div><div class="stat-val">${totalM.toFixed(1)}</div></div>
    <div class="stat-card"><div class="stat-label">Операций</div><div class="stat-val">${state.writeoffs.length}</div></div>
    <div class="stat-card"><div class="stat-label">На складе (м)</div><div class="stat-val">${state.materials.reduce((s,m)=>s+m.stock,0).toFixed(1)}</div></div>
  `;

  // Chart: last 7 days
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i); d.setHours(0,0,0,0);
    days.push({ date: d, count: 0, label: i === 0 ? 'Сег' : i === 1 ? 'Вч' : d.toLocaleDateString('ru',{weekday:'short'}) });
  }
  state.writeoffs.forEach(w => {
    const d = new Date(w.timestamp); d.setHours(0,0,0,0);
    const day = days.find(dd => dd.date.getTime() === d.getTime());
    if (day) day.count += w.quantity;
  });
  const maxCount = Math.max(...days.map(d => d.count), 1);
  document.getElementById('chart-bars').innerHTML = days.map(d => `
    <div class="chart-col">
      <div class="chart-day-val">${d.count > 0 ? d.count : ''}</div>
      <div class="chart-bar-fill ${d.count>0?'has-data':''}" style="height:${Math.max(d.count/maxCount*60,d.count>0?4:2)}px"></div>
      <div class="chart-day-label">${d.label}</div>
    </div>
  `).join('');

  renderDayHistory();
}

// ── Render all ────────────────────────────────────────────────────────────
function renderAll() {
  renderMaterials();
  renderProdMatSelect('prod-mat-select');
  renderProducts();
  renderWoItems();
  renderIsland('island-mats-1');
  renderIsland('island-mats-2');
  renderSummary();
}

// ── Init ──────────────────────────────────────────────────────────────────
async function initApp() {
  loadLocal();
  updateMatFields();
  renderAll();
  setSyncStatus(false, 'Синхронизация...');
  const result = await loadCloud();
  if (result === 'loaded') {
    saveLocal(); renderAll(); setSyncStatus(true, 'Синхронизировано');
  } else if (result === 'empty') {
    saveCloud().then(() => setSyncStatus(true, 'Синхронизировано'));
  } else {
    setSyncStatus(false, 'Нет связи');
  }
  setInterval(async () => {
    if (await loadCloud() === 'loaded') { saveLocal(); renderAll(); setSyncStatus(true, 'Синхронизировано'); }
  }, 60000);
}

if (sessionStorage.getItem('sklad-auth') === '1') {
  document.getElementById('auth-screen').classList.add('hidden');
  initApp();
} else {
  setTimeout(() => document.getElementById('auth-input').focus(), 100);
}
</script>
